name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify application structure
      run: |
        python -c "import flask, requests, zxcvbn; print('✓ All dependencies imported successfully')"

    - name: Check syntax
      run: |
        python -m py_compile app.py

    - name: Test imports
      run: |
        python -c "from app import calculate_shannon_entropy, check_haveibeenpwned, assess_password_strength; print('✓ All functions imported successfully')"
